name: Build ROIStudio

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ROIStudio-windows-x64

          - os: macos-13
            artifact_name: ROIStudio-macos-intel

          - os: macos-14
            artifact_name: ROIStudio-macos-silicon

    steps:
      - name: Checkout roistudio
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add GitHub to known hosts (macOS)
        if: runner.os == 'macOS'
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add GitHub to known hosts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory -Path "$env:USERPROFILE\.ssh" | Out-Null
          $key = "github.com ssh-rsa "
          Add-Content -Path "$env:USERPROFILE\.ssh\known_hosts" -Value $key

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv
        run: uv venv --python 3.11

      # Install CPU torch for all CI builds.
      # The PyTorch CPU index has wheels for all platforms including Windows.
      - name: Install torch (CPU)
        run: uv pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cpu

      # Install sparc and all its deps (including MillionConcepts private repos)
      # directly from GitHub via SSH — bypasses the local editable path
      - name: Install sparc from GitHub
        run: uv pip install "sparc @ git+ssh://git@github.com/lars-olt/sparc.git"

      # Install roistudio's own deps (PyQt5, matplotlib, pyyaml) directly.
      # We skip uv sync entirely because the lockfile references ../sparc
      # which doesn't exist on CI runners.
      - name: Install roistudio dependencies
        run: uv pip install "PyQt5==5.15.11" "pyqt5-qt5==5.15.2" "pyqt5-sip>=12.11" "matplotlib>=3.3.0" "PyYAML>=6.0" "setuptools<81"

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        run: pyinstaller roistudio.spec --clean

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path ROIStudio -DestinationPath ../${{ matrix.artifact_name }}.zip

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact_name }}.zip ROIStudio.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ROIStudio ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ROIStudio-windows-x64/ROIStudio-windows-x64.zip
            artifacts/ROIStudio-macos-intel/ROIStudio-macos-intel.zip
            artifacts/ROIStudio-macos-silicon/ROIStudio-macos-silicon.zip
          body: |
            ## Installation

            Download the zip for your platform, unzip it, and run `ROIStudio` inside.

            **Before first launch:** Go to File -> Set SAM Path and point it to your SAM model weights (`sam_vit_h_4b8939.pth`).
            Download SAM weights: https://dl.fbaipublicfiles.com/segment_anything/sam_vit_h_4b8939.pth

            | Platform | Download |
            |----------|----------|
            | Windows (x64) | ROIStudio-windows-x64.zip |
            | macOS Intel | ROIStudio-macos-intel.zip |
            | macOS Apple Silicon | ROIStudio-macos-silicon.zip |