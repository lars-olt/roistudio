name: Build ROIStudio

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ROIStudio-windows-x64
            torch_cmd: uv pip install torch==2.2.2 torchvision==0.17.2 --index-url https://download.pytorch.org/whl/cu124

          - os: macos-12
            artifact_name: ROIStudio-macos-intel
            torch_cmd: uv pip install torch==2.2.2 torchvision==0.17.2

          - os: macos-14
            artifact_name: ROIStudio-macos-silicon
            torch_cmd: uv pip install torch==2.2.2 torchvision==0.17.2

    steps:
      - name: Checkout roistudio
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Add GitHub to known hosts (macOS/Linux)
        if: runner.os != 'Windows'
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add GitHub to known hosts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $knownHostsPath = "$env:USERPROFILE\.ssh\known_hosts"
          New-Item -Force -ItemType Directory -Path "$env:USERPROFILE\.ssh" | Out-Null
          $githubKey = "github.com ssh-rsa "
          Add-Content -Path $knownHostsPath -Value $githubKey

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Create venv
        run: uv venv --python 3.11

      - name: Install torch (platform-specific)
        run: ${{ matrix.torch_cmd }}

      # Override the local editable sparc path for CI - use the Git URL instead
      - name: Install sparc from GitHub (CI override)
        run: uv pip install "sparc @ git+ssh://git@github.com/lars-olt/sparc.git"

      - name: Install dependencies
        run: uv sync --no-install-package sparc

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable
        run: uv run pyinstaller roistudio.spec --clean

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path ROIStudio -DestinationPath ../${{ matrix.artifact_name }}.zip

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact_name }}.zip ROIStudio.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ROIStudio ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/ROIStudio-windows-x64/ROIStudio-windows-x64.zip
            artifacts/ROIStudio-macos-intel/ROIStudio-macos-intel.zip
            artifacts/ROIStudio-macos-silicon/ROIStudio-macos-silicon.zip
          body: |
            ## Installation

            Download the zip for your platform, unzip it, and run `ROIStudio` inside.

            **Before first launch:** Go to File -> Set SAM Path and point it to your SAM model weights (`sam_vit_h_4b8939.pth`).
            Download SAM weights: https://dl.fbaipublicfiles.com/segment_anything/sam_vit_h_4b8939.pth

            | Platform | Download |
            |----------|----------|
            | Windows (x64) | ROIStudio-windows-x64.zip |
            | macOS Intel | ROIStudio-macos-intel.zip |
            | macOS Apple Silicon | ROIStudio-macos-silicon.zip |